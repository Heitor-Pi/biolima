<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="5">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Heitor</td>
                <td>20</td>
                <td>Itapecerica da Serra</td>
            </tr>
            <tr>
                <td>Marcela</td>
                <td>18</td>
                <td>São Paulo</td>
            </tr>
            <tr>
                <td>Pablo</td>
                <td>69</td>
                <td>Pirituba</td>
            </tr>
            
        </tbody>
    </table>
</body>
</html>
